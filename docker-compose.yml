services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voxa}
      POSTGRES_USER: ${POSTGRES_USER:-voxa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voxa_local_password}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voxa} -d ${POSTGRES_DB:-voxa}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [voxa]

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${API_PORT:-8787}:8787"
    environment:
      PORT: 8787
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-voxa}
      PGUSER: ${POSTGRES_USER:-voxa}
      PGPASSWORD: ${POSTGRES_PASSWORD:-voxa_local_password}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      DB_CONNECT_RETRIES: 30
      REDIS_URL: redis://redis:6379
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8787}
      WEBSITE_URL: ${WEBSITE_URL:-http://localhost}
      TELEPHONY_PROVIDER: ${TELEPHONY_PROVIDER:-exotel}
      EXOTEL_ACCOUNT_SID: ${EXOTEL_ACCOUNT_SID:-}
      EXOTEL_API_KEY: ${EXOTEL_API_KEY:-}
      EXOTEL_API_TOKEN: ${EXOTEL_API_TOKEN:-}
      EXOTEL_SUBDOMAIN: ${EXOTEL_SUBDOMAIN:-api.exotel.com}
      EXOTEL_EXOPHONE: ${EXOTEL_EXOPHONE:-}
      EXOTEL_APP_ID: ${EXOTEL_APP_ID:-}
      PLIVO_AUTH_ID: ${PLIVO_AUTH_ID:-}
      PLIVO_AUTH_TOKEN: ${PLIVO_AUTH_TOKEN:-}
      PLIVO_FROM_NUMBER: ${PLIVO_FROM_NUMBER:-}
      GEMINI_LIVE_BRIDGE_URL: ${GEMINI_LIVE_BRIDGE_URL:-}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      DEMO_EMAIL_FROM: ${DEMO_EMAIL_FROM:-Voxa <demo@example.com>}
      UNSUBSCRIBE_SIGNING_SECRET: ${UNSUBSCRIBE_SIGNING_SECRET:-development-only-change-me}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [voxa]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [voxa]

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    networks: [voxa]

volumes:
  postgres_data:
  redis_data:

networks:
  voxa:
