services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voxa}
      POSTGRES_USER: ${POSTGRES_USER:-voxa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voxa_local_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voxa} -d ${POSTGRES_DB:-voxa}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [voxa]

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 8787
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-voxa}
      PGUSER: ${POSTGRES_USER:-voxa}
      PGPASSWORD: ${POSTGRES_PASSWORD:-voxa_local_password}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      DB_CONNECT_RETRIES: 30
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [voxa]

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    networks: [voxa]

volumes:
  postgres_data:

networks:
  voxa:
